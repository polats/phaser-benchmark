name: Deploy Playground to Vercel

# Deploys the standalone browser playground (the benchmarks/demos with a mock
# /api) to Vercel. This is NOT the Reddit app — that deploys to Devvit via
# deploy.yml. Use this for a public, shareable URL you can open without Reddit.
#
# Build: `npm run build:web` -> dist-web/ (static). The /api/* mock ships as
# Vercel serverless functions in /api.

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: vercel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (vercel build runs `npm run build:web` + /api functions)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# One-time setup: this workflow needs THREE repository secrets (a Vercel token,
# not your GitHub PAT). Create a Vercel project linked to this repo first.
#
#   1. Get a token:  https://vercel.com/account/tokens  -> VERCEL_TOKEN
#   2. Link the project once (locally, in this repo):
#        npx vercel link
#      then read the IDs it writes:
#        cat .vercel/project.json   # -> { "orgId": "...", "projectId": "..." }
#   3. Add all three as repo secrets:
#        gh secret set VERCEL_TOKEN
#        gh secret set VERCEL_ORG_ID --body "<orgId>"
#        gh secret set VERCEL_PROJECT_ID --body "<projectId>"
#
# Simpler alternative (no workflow, no secrets): import the repo at
# vercel.com/new — Vercel's GitHub app auto-deploys every push using vercel.json.
# If you do that, delete this workflow to avoid double-deploys.
# ─────────────────────────────────────────────────────────────────────────────
